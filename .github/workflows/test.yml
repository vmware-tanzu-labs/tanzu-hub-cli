name: Go Tests

on:
  pull_request:

jobs:
  test:
    name: Run Sub-directory Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run tests in sub-directories
        run: go test ./...